<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form action="class4.html">
        <label for="Fname">First Name</label>

        <br><br>

            <option >Hisar</option>
            <option>jind</option>
            <option >Hisar</option>
            <option>jind</option>
            <option >Hisar</option>
            <option>jind</option>
            <option >Hisar</option>

        </datalist>




        <label for="uploadphot">Unload image</label>

        <input type="password" name="password" id="password">

        <input type="text" readonly value="1002" name="srno">

        <label for="selectRange">Select Range</label>
        
        <input type="range" name="range" min="10" value="20" max="100" id="selectRange">
        <br><br>

        <label for="Address">Address:- </label>
        <textarea name="" rows="4" cols="30" id="">Address:-</textarea>

        <input type="color">

        <input type="search">

        <label for="no">Enter no</label>
        <input type="number" max="100" min="10" id="no" name="no">

        <input type="submit" value="save from" name="" id="">
