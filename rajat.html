<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Groq Vision Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #161920;
      --border:     #2a2f3d;
      --accent:     #7c6fff;
      --accent-dim: #3d3880;
      --text:       #e4e6f0;
      --muted:      #6b7280;
      --green:      #34d399;
      --red:        #f87171;
      --mono:       'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --sans:       'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
    }

    /* ── API Key ── */
    .field-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .api-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .api-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-row input:focus { border-color: var(--accent); }

    /* ── Drop zone ── */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 24px;
    }

    .dropzone:hover, .dropzone.over {
      border-color: var(--accent);
      background: rgba(124,111,255,0.05);
    }

    .dropzone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
    }

    .dropzone-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .dropzone p {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .dropzone strong { color: var(--text); }

    /* ── Preview ── */
    #preview-wrap {
      display: none;
      margin-bottom: 24px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    #preview-wrap img {
      width: 100%;
      max-height: 340px;
      object-fit: contain;
      background: #0a0c10;
      display: block;
    }

    .preview-badge {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Prompt ── */
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.88rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    textarea:focus { border-color: var(--accent); }

    /* ── Button ── */
    button.primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    button.primary:hover:not(:disabled) { opacity: 0.88; }
    button.primary:active:not(:disabled) { transform: scale(0.98); }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Status ── */
    #status {
      margin-top: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      transition: color 0.2s;
    }

    #status.ok  { color: var(--green); }
    #status.err { color: var(--red); }

    /* ── Result ── */
    #result-card {
      display: none;
      margin-top: 28px;
      width: 100%;
      max-width: 680px;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .result-header span {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #copy-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #copy-btn:hover { background: var(--accent); color: #fff; }

    pre#json-output {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.7;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* JSON syntax colours */
    .jk { color: #79b8ff; }   /* key */
    .js { color: #9ecbff; }   /* string value */
    .jn { color: #f0883e; }   /* number */
    .jb { color: #d2a8ff; }   /* bool/null */
    .jp { color: var(--muted); } /* punctuation */

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Groq · Vision · JSON</p>
  <h1>Image Analyzer</h1>
  <p>Upload an image → LLM reads it → structured JSON in console &amp; UI</p>
</header>

<!-- Config + Upload card -->
<div class="card">

  <!-- API Key -->
  <label class="field-label">Groq API Key</label>
  <div class="api-row">
    <input type="password" id="api-key" placeholder="gsk_..." autocomplete="off"/>
  </div>

  <!-- Drop zone -->
  <label class="field-label">Image</label>
  <div class="dropzone" id="dropzone">
    <input type="file" id="file-input" accept="image/*"/>
    <div class="dropzone-icon">🖼️</div>
    <p><strong>Click to upload</strong> or drag &amp; drop</p>
    <p>PNG, JPG, WEBP, GIF — up to 20 MB</p>
  </div>

  <!-- Image preview -->
  <div id="preview-wrap">
    <img id="preview-img" alt="preview"/>
    <span class="preview-badge" id="file-name-badge"></span>
  </div>

  <!-- Prompt -->
  <label class="field-label">Prompt</label>
  <textarea id="prompt">Analyze this image in detail. Return ONLY valid JSON with the following keys: description, objects (array), colors (array), text_in_image, scene_type, mood, confidence_score (0-1). No markdown, no explanation — raw JSON only.</textarea>

  <button class="primary" id="analyze-btn" disabled>Analyze Image</button>
  <div id="status"></div>
</div>

<!-- JSON result -->
<div id="result-card">
  <div class="result-header">
    <span>📦 JSON Output</span>
    <button id="copy-btn">Copy JSON</button>
  </div>
  <pre id="json-output"></pre>
</div>

<footer>Open DevTools console (F12) to see the raw JSON object logged there too.</footer>

<script>
  const fileInput   = document.getElementById('file-input');
  const dropzone    = document.getElementById('dropzone');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg  = document.getElementById('preview-img');
  const fileNameBadge = document.getElementById('file-name-badge');
  const analyzeBtn  = document.getElementById('analyze-btn');
  const statusEl    = document.getElementById('status');
  const resultCard  = document.getElementById('result-card');
  const jsonOutput  = document.getElementById('json-output');
  const copyBtn     = document.getElementById('copy-btn');
  const apiKeyInput = document.getElementById('api-key');
  const promptInput = document.getElementById('prompt');

  let base64Image = null;
  let imageMediaType = 'image/jpeg';

  // ── Drag-over styling ──
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) {
      setStatus('Only image files are supported.', 'err'); return;
    }
    imageMediaType = file.type;
    fileNameBadge.textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      const dataURL = e.target.result;
      previewImg.src = dataURL;
      previewWrap.style.display = 'block';
      // Strip the "data:image/...;base64," prefix
      base64Image = dataURL.split(',')[1];
      analyzeBtn.disabled = false;
      setStatus('Image loaded — click Analyze to continue.', '');
      resultCard.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // ── Analyze ──
  analyzeBtn.addEventListener('click', async () => {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { setStatus('Please enter your Groq API key.', 'err'); return; }
    if (!base64Image) { setStatus('Please upload an image first.', 'err'); return; }

    analyzeBtn.disabled = true;
    resultCard.style.display = 'none';
    setStatus('<span class="spinner"></span>Sending to Groq…', '');

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'meta-llama/llama-4-scout-17b-16e-instruct',
          messages: [
            {
              role: 'user',
              content: [
                {
                  type: 'image_url',
                  image_url: {
                    url: `data:${imageMediaType};base64,${base64Image}`
                  }
                },
                {
                  type: 'text',
                  text: promptInput.value.trim()
                }
              ]
            }
          ],
          temperature: 0.2,
          max_tokens: 1024
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const rawText = data.choices?.[0]?.message?.content || '';

      // Clean possible markdown fences
      const cleaned = rawText.replace(/```json|```/gi, '').trim();

      let parsed;
      try {
        parsed = JSON.parse(cleaned);
      } catch {
        // Not valid JSON — show raw
        parsed = { raw_response: cleaned };
      }

      // ── Log to console ──
      console.group('%c🖼️ Groq Image Analysis Result', 'color:#7c6fff;font-size:14px;font-weight:bold');
      console.log('%cJSON Object:', 'color:#34d399;font-weight:bold', parsed);
      console.log('%cRaw string:', 'color:#9ecbff', rawText);
      console.groupEnd();

      // ── Display in UI ──
      jsonOutput.innerHTML = syntaxHighlight(JSON.stringify(parsed, null, 2));
      resultCard.style.display = 'block';
      setStatus('✓ Done — JSON logged to console &amp; shown below.', 'ok');

      // Store for copy
      jsonOutput._raw = JSON.stringify(parsed, null, 2);

    } catch (err) {
      console.error('Groq API error:', err);
      setStatus(`Error: ${err.message}`, 'err');
    } finally {
      analyzeBtn.disabled = false;
    }
  });

  // ── Copy ──
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(jsonOutput._raw || jsonOutput.textContent).then(() => {
      copyBtn.textContent = '✓ Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy JSON', 1800);
    });
  });

  // ── Helpers ──
  function setStatus(msg, type) {
    statusEl.innerHTML = msg;
    statusEl.className = type;
  }

  function syntaxHighlight(json) {
    return json
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        match => {
          if (/^"/.test(match)) {
            return /:$/.test(match)
              ? `<span class="jk">${match}</span>`
              : `<span class="js">${match}</span>`;
          }
          if (/true|false|null/.test(match)) return `<span class="jb">${match}</span>`;
          return `<span class="jn">${match}</span>`;
        }
      );
  }
</script>
</body>
</html>
